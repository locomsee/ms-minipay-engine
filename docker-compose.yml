services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: minipay
      POSTGRES_USER: minipay
      POSTGRES_PASSWORD: minipay
    ports:
      - "5432:5432"
    volumes:
      - minipay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minipay -d minipay"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/minipay
      DB_USERNAME: minipay
      DB_PASSWORD: minipay
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  minipay-postgres-data:
